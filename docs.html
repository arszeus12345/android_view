<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài liệu hướng dẫn - DroidVision Pro</title>
  <meta name="description" content="Hướng dẫn chi tiết cách kết nối thiết bị Android, điều khiển đồng bộ hàng loạt, cài đặt APK nhanh và khắc phục các sự cố thường gặp trên DroidVision Pro.">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- --- HEADER / NAVIGATION --- -->
  <header class="header" id="header">
    <div class="container">
      <a href="index.html" class="logo" id="header-logo">
        <!-- Động: Tải từ data.js -->
      </a>
      
      <nav class="nav-links" id="header-nav-links">
        <!-- Động: Tải các link từ data.js -->
      </nav>

      <div class="nav-cta">
        <a href="index.html#pricing" class="btn btn-secondary" id="header-cta">
          <!-- Động: CTA từ data.js -->
        </a>
      </div>

      <button class="menu-btn" id="menu-open-btn" aria-label="Open mobile menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </header>

  <!-- --- MOBILE NAVIGATION OVERLAY --- -->
  <div class="mobile-nav" id="mobile-nav">
    <!-- Động: Copy link điều hướng vào đây qua JS -->
  </div>

  <!-- --- MAIN DOCUMENTATION CONTENT --- -->
  <main class="docs-layout">
    <!-- Ambient Pastel Orbs to align design theme -->
    <div class="orb orb-1" style="top: 50px; left: -10%;"></div>
    <div class="orb orb-2" style="top: 400px; right: -10%;"></div>

    <div class="container docs-grid">
      
      <!-- Sticky Sidebar Navigation -->
      <aside class="docs-sidebar">
        <h3 class="docs-menu-title" id="docs-sidebar-title">Tài liệu hướng dẫn</h3>
        <ul class="docs-menu-list" id="docs-menu-list">
          <!-- Động: Tải từ docs_data.js -->
        </ul>
      </aside>

      <!-- Documentation Content Area -->
      <article class="docs-content" id="docs-content-area">
        <!-- Động: Tải từ docs_data.js -->
      </article>

    </div>
  </main>

  <!-- --- FOOTER --- -->
  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <div class="footer-about">
          <div class="logo" id="footer-logo">
            <!-- Động -->
          </div>
          <p class="footer-about-text" id="footer-about-text">
            <!-- Động -->
          </p>
          <div class="footer-socials" id="footer-socials">
            <!-- Động -->
          </div>
        </div>

        <div class="footer-nav">
          <h4 class="footer-title">Khám Phá</h4>
          <ul class="footer-links" id="footer-links-container">
            <!-- Động -->
          </ul>
        </div>

        <div class="footer-info">
          <h4 class="footer-title">Liên Hệ Trợ Giúp</h4>
          <div class="footer-contact" id="footer-contact-container">
            <!-- Động -->
          </div>
        </div>
      </div>

      <div class="footer-bottom">
        <p id="footer-copyright"></p>
      </div>
    </div>
  </footer>

  <!-- Dữ liệu JS -->
  <script src="docs_data.js"></script>
  <script src="data.js"></script>
  <!-- Logic JS chính (phát triển các thành phần Header/Footer động) -->
  <script src="main.js"></script>

  <!-- Script bổ trợ trang tài liệu -->
  <script>
    // Hàm copy nội dung của code block
    function copyCode(button) {
      const container = button.closest('.docs-code-container');
      const codeElement = container.querySelector('.docs-code-pre code');
      if (!codeElement) return;

      const codeText = codeElement.textContent;

      navigator.clipboard.writeText(codeText).then(() => {
        const originalHTML = button.innerHTML;
        button.innerHTML = '<i class="fas fa-check"></i> Đã sao chép';
        button.style.backgroundColor = 'rgba(16, 185, 129, 0.2)';
        button.style.color = '#10b981';

        setTimeout(() => {
          button.innerHTML = originalHTML;
          button.style.backgroundColor = '';
          button.style.color = '';
        }, 2000);
      }).catch(err => {
        console.error('Không thể sao chép văn bản: ', err);
      });
    }

    // Render động nội dung tài liệu từ docsData
    document.addEventListener('DOMContentLoaded', () => {
      const docs = window.docsData;
      if (!docs) {
        console.error("Không tìm thấy dữ liệu docsData từ docs_data.js!");
        return;
      }

      // Đặt tiêu đề sidebar
      const sidebarTitle = document.getElementById('docs-sidebar-title');
      if (sidebarTitle && docs.title) {
        sidebarTitle.textContent = docs.title;
      }

      // Render danh mục bên trái
      const menuList = document.getElementById('docs-menu-list');
      if (menuList) {
        menuList.innerHTML = docs.sections.map((section, idx) => `
          <li class="docs-menu-item ${idx === 0 ? 'active' : ''}" data-target="${section.id}">
            <a href="#${section.id}">${section.title}</a>
          </li>
        `).join('');
      }

      // Render nội dung bên phải
      const contentArea = document.getElementById('docs-content-area');
      if (contentArea) {
        contentArea.innerHTML = docs.sections.map(section => {
          const blocksHtml = section.content.map(block => {
            switch(block.type) {
              case 'paragraph':
                return `<p class="docs-text">${block.text}</p>`;
              case 'subtitle':
                return `<h3 class="docs-section-subtitle">${block.text}</h3>`;
              case 'callout':
                return `
                  <div class="docs-callout ${block.style}">
                    <div class="docs-callout-icon"><i class="fas ${block.icon}"></i></div>
                    <div class="docs-callout-content">
                      <h4 class="docs-callout-title">${block.title}</h4>
                      <p class="docs-callout-desc">${block.desc}</p>
                    </div>
                  </div>
                `;
              case 'steps':
                const stepsHtml = block.items.map(step => `
                  <div class="docs-step">
                    <h4 class="docs-step-title">${step.title}</h4>
                    <p class="docs-text">${step.text}</p>
                  </div>
                `).join('');
                return `<div class="docs-steps">${stepsHtml}</div>`;
              case 'list':
                const listHtml = block.items.map(item => `<li>${item}</li>`).join('');
                return `<ul class="docs-list">${listHtml}</ul>`;
              case 'code':
                return `
                  <div class="docs-code-container">
                    <div class="docs-code-header">
                      <span class="docs-code-lang">${block.lang}</span>
                      <button class="docs-copy-btn" onclick="copyCode(this)"><i class="far fa-copy"></i> Sao chép</button>
                    </div>
                    <div class="docs-code-pre">
                      <pre><code>${block.code}</code></pre>
                    </div>
                  </div>
                `;
              default:
                return '';
            }
          }).join('');

          return `
            <section id="${section.id}" class="docs-section">
              <h2 class="docs-section-title">${section.title}</h2>
              ${blocksHtml}
            </section>
          `;
        }).join('');
      }

      // Khởi chạy Scrollspy
      initScrollspy();
    });

    // Scrollspy và chuyển đổi active trên sidebar menu khi click hoặc cuộn
    function initScrollspy() {
      const sections = document.querySelectorAll('.docs-section');
      const menuItems = document.querySelectorAll('.docs-menu-item');

      function activeMenuOnScroll() {
        let currentSectionId = '';
        const scrollPosition = window.scrollY + 160; // offset tương ứng với thanh header sticky

        sections.forEach(section => {
          const sectionTop = section.offsetTop;
          const sectionHeight = section.offsetHeight;

          if (scrollPosition >= sectionTop && scrollPosition < sectionTop + sectionHeight) {
            currentSectionId = section.getAttribute('id');
          }
        });

        if (currentSectionId) {
          menuItems.forEach(item => {
            item.classList.remove('active');
            if (item.getAttribute('data-target') === currentSectionId) {
              item.classList.add('active');
            }
          });
        }

        // Nếu ở đầu trang thì mặc định highlight mục đầu tiên
        if (window.scrollY < 100 && menuItems.length > 0) {
          menuItems.forEach(item => item.classList.remove('active'));
          menuItems[0].classList.add('active');
        }
      }

      window.addEventListener('scroll', activeMenuOnScroll);
      activeMenuOnScroll(); // chạy lần đầu khi load
    }
  </script>
</body>
</html>
